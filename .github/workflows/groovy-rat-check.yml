name: Check licenses

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      
      - uses: gradle/actions/setup-gradle@prerelease/config-cache-support
        with:
          develocity-url: 'https://ge.solutions-team.gradle.com'
          develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
        env:
          DEVELOCITY_STORE_CONFIGURATION_CACHE: 'true'

      - name: Check licenses with rat
        run: ./gradlew rat --configuration-cache
        timeout-minutes: 60
